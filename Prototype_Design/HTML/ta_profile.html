<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TA招聘管理系统 - 个人档案</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; background: #fafafa; color: #333; }

        .topbar {
            background: #fff;
            border-bottom: 1px solid #ddd;
            padding: 14px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .topbar-title { font-size: 15px; font-weight: 600; }
        .topbar-right { font-size: 13px; color: #666; }
        .topbar-right a { color: #333; text-decoration: none; margin-left: 16px; }

        .main { display: flex; max-width: 1080px; margin: 32px auto; gap: 24px; padding: 0 16px; }
        .sidebar { width: 200px; flex-shrink: 0; }
        .content { flex: 1; }

        .nav-item {
            display: block;
            padding: 10px 16px;
            font-size: 14px;
            color: #555;
            text-decoration: none;
            border-left: 3px solid transparent;
        }
        .nav-item.active { color: #000; font-weight: 600; border-left-color: #000; background: #f0f0f0; }

        .card {
            background: #fff;
            border: 1px solid #ddd;
            padding: 24px;
            margin-bottom: 20px;
        }
        .card h2 { font-size: 15px; font-weight: 600; margin-bottom: 20px; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px 32px;
            margin-bottom: 16px;
        }
        .form-row.full { grid-template-columns: 1fr; }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #888;
            margin-bottom: 6px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #ccc;
            font-size: 14px;
            outline: none;
        }
        .form-group textarea { resize: vertical; min-height: 80px; }

        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
        }
        .skill-tag {
            padding: 4px 12px;
            font-size: 12px;
            border: 1px solid #ccc;
            background: #f5f5f5;
        }

        .file-upload {
            padding: 20px;
            border: 1px dashed #ccc;
            text-align: center;
            font-size: 13px;
            color: #888;
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .btn {
            padding: 9px 24px;
            font-size: 13px;
            border: 1px solid #ccc;
            background: #fff;
            cursor: pointer;
        }
        .btn-primary { background: #000; color: #fff; border-color: #000; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-title">TA 招聘管理系统</div>
    <div class="topbar-right">
        张三 (2024001) · 应聘者
        <a href="ta_dashboard.html">返回控制台</a>
        <a href="login.html">退出登录</a>
    </div>
</div>

<div class="main">
    <div class="sidebar">
        <a class="nav-item" href="ta_dashboard.html">控制台</a>
        <a class="nav-item" href="#">岗位列表</a>
        <a class="nav-item" href="#">我的申请</a>
        <a class="nav-item active" href="#">个人档案</a>
    </div>

    <div class="content">

        <!-- Basic info -->
        <div class="card">
            <h2>基础信息</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" value="张三">
                </div>
                <div class="form-group">
                    <label>学号</label>
                    <input type="text" value="2024001" disabled style="background:#f5f5f5;">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>所属专业</label>
                    <input type="text" value="计算机科学与技术">
                </div>
                <div class="form-group">
                    <label>可任职时间段</label>
                    <select>
                        <option selected>2026 春季学期</option>
                        <option>2026 秋季学期</option>
                        <option>2026 春季 + 秋季学期</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>联系电话</label>
                    <input type="text" value="138-0000-1234">
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="text" value="zhangsan@mail.uic.edu.cn">
                </div>
            </div>
        </div>

        <!-- Skills -->
        <div class="card">
            <h2>个人技能</h2>
            <div class="skill-tags">
                <span class="skill-tag">Java</span>
                <span class="skill-tag">Python</span>
                <span class="skill-tag">SQL</span>
                <span class="skill-tag">Git</span>
                <span class="skill-tag">Linux</span>
            </div>
            <div class="form-row full" style="margin-top: 16px;">
                <div class="form-group">
                    <label>补充说明</label>
                    <textarea>有一学期 CSC1001 助教经验，熟悉课程辅导流程。</textarea>
                </div>
            </div>
        </div>

        <!-- Resume upload -->
        <div class="card">
            <h2>个人简历</h2>
            <div class="file-upload">
                点击上传简历（支持 .txt / .docx 格式）<br>
                <span style="font-size: 12px; color: #aaa;">已上传：张三_简历.docx</span>
            </div>
        </div>

        <!-- Actions -->
        <div class="actions">
            <button class="btn btn-primary">保存档案</button>
            <button class="btn">导出为 JSON</button>
        </div>

    </div>
</div>

</body>
</html>
