<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TA招聘管理系统 - 发布岗位</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; background: #fafafa; color: #333; }

        .topbar {
            background: #fff;
            border-bottom: 1px solid #ddd;
            padding: 14px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .topbar-title { font-size: 15px; font-weight: 600; }
        .topbar-right { font-size: 13px; color: #666; }
        .topbar-right a { color: #333; text-decoration: none; margin-left: 16px; }

        .main { display: flex; max-width: 1080px; margin: 32px auto; gap: 24px; padding: 0 16px; }
        .sidebar { width: 200px; flex-shrink: 0; }
        .content { flex: 1; }

        .nav-item {
            display: block;
            padding: 10px 16px;
            font-size: 14px;
            color: #555;
            text-decoration: none;
            border-left: 3px solid transparent;
        }
        .nav-item.active { color: #000; font-weight: 600; border-left-color: #000; background: #f0f0f0; }

        .card {
            background: #fff;
            border: 1px solid #ddd;
            padding: 24px;
            margin-bottom: 20px;
        }
        .card h2 { font-size: 15px; font-weight: 600; margin-bottom: 20px; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px 32px;
            margin-bottom: 16px;
        }
        .form-row.full { grid-template-columns: 1fr; }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #888;
            margin-bottom: 6px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #ccc;
            font-size: 14px;
            outline: none;
        }
        .form-group textarea { resize: vertical; min-height: 100px; }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .btn {
            padding: 9px 24px;
            font-size: 13px;
            border: 1px solid #ccc;
            background: #fff;
            cursor: pointer;
        }
        .btn-primary { background: #000; color: #fff; border-color: #000; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-title">TA 招聘管理系统</div>
    <div class="topbar-right">
        李教授 (MO2001) · 课程组织者
        <a href="mo_dashboard.html">返回控制台</a>
        <a href="login.html">退出登录</a>
    </div>
</div>

<div class="main">
    <div class="sidebar">
        <a class="nav-item" href="mo_dashboard.html">控制台</a>
        <a class="nav-item" href="#">我的岗位</a>
        <a class="nav-item active" href="#">发布岗位</a>
        <a class="nav-item" href="#">应聘者管理</a>
        <a class="nav-item" href="#">岗位统计</a>
    </div>

    <div class="content">

        <div class="card">
            <h2>岗位基础信息</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>岗位名称</label>
                    <input type="text" placeholder="如：EBU6304 Software Engineering TA">
                </div>
                <div class="form-group">
                    <label>所属课程 / 活动</label>
                    <input type="text" placeholder="如：EBU6304 Software Engineering">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>招聘人数</label>
                    <input type="number" placeholder="如：3">
                </div>
                <div class="form-group">
                    <label>申请截止时间</label>
                    <input type="date" value="2026-04-30">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>任职时间段</label>
                    <select>
                        <option value="">-- 请选择 --</option>
                        <option>2026 春季学期</option>
                        <option>2026 秋季学期</option>
                        <option>2026 春季 + 秋季学期</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>岗位类型</label>
                    <select>
                        <option value="">-- 请选择 --</option>
                        <option>课程助教</option>
                        <option>实验助教</option>
                        <option>活动助教</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>任职要求</h2>
            <div class="form-row full">
                <div class="form-group">
                    <label>岗位描述</label>
                    <textarea placeholder="请描述岗位的主要职责和工作内容..."></textarea>
                </div>
            </div>
            <div class="form-row full">
                <div class="form-group">
                    <label>技能要求</label>
                    <textarea placeholder="如：熟悉 Java、Git，有项目开发经验优先..." style="min-height: 60px;"></textarea>
                </div>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-primary">发布岗位</button>
            <button class="btn">保存草稿</button>
            <button class="btn">取消</button>
        </div>

    </div>
</div>

</body>
</html>
