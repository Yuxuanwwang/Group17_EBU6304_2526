<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TA招聘管理系统 - 登录 / 注册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #fafafa;
        }

        .container {
            width: 400px;
            background: #fff;
            border: 1px solid #ddd;
            padding: 40px 32px;
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            font-size: 13px;
            color: #888;
            margin-bottom: 28px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 1px solid #ddd;
            margin-bottom: 24px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            cursor: pointer;
            font-size: 14px;
            color: #888;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab.active {
            color: #000;
            border-bottom-color: #000;
        }

        /* Form */
        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            font-size: 14px;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #333;
        }

        .error-msg {
            font-size: 12px;
            color: #c00;
            margin-top: 4px;
            display: none;
        }

        .btn {
            width: 100%;
            padding: 11px 0;
            background: #000;
            color: #fff;
            border: none;
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
        }

        .btn:hover {
            background: #333;
        }

        .message {
            text-align: center;
            font-size: 13px;
            margin-top: 16px;
            padding: 10px;
            display: none;
        }

        .message.success {
            color: #080;
            background: #efffef;
            border: 1px solid #cec;
            display: block;
        }

        .message.error {
            color: #c00;
            background: #fff0f0;
            border: 1px solid #ecc;
            display: block;
        }

        /* Panel toggle */
        .panel { display: none; }
        .panel.active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>TA 招聘管理系统</h1>
        <p class="subtitle">Teaching Assistant Recruitment System</p>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">登录</div>
            <div class="tab" onclick="switchTab('register')">注册</div>
        </div>

        <!-- Login Panel -->
        <div id="login-panel" class="panel active">
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>账号 (学号 / 工号)</label>
                    <input type="text" id="login-account" placeholder="请输入账号">
                    <div class="error-msg" id="login-account-error"></div>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="login-password" placeholder="请输入密码">
                    <div class="error-msg" id="login-password-error"></div>
                </div>
                <button type="submit" class="btn">登 录</button>
                <div class="message" id="login-msg"></div>
            </form>
        </div>

        <!-- Register Panel -->
        <div id="register-panel" class="panel">
            <form id="register-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>账号 (学号 / 工号)</label>
                    <input type="text" id="reg-account" placeholder="请输入学号或工号">
                    <div class="error-msg" id="reg-account-error"></div>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="reg-password" placeholder="请输入密码（至少6位）">
                    <div class="error-msg" id="reg-password-error"></div>
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" id="reg-confirm" placeholder="请再次输入密码">
                    <div class="error-msg" id="reg-confirm-error"></div>
                </div>
                <div class="form-group">
                    <label>角色</label>
                    <select id="reg-role">
                        <option value="">-- 请选择角色 --</option>
                        <option value="applicant">应聘者 (TA Applicant)</option>
                        <option value="mo">课程组织者 (Module Organiser)</option>
                        <option value="admin">系统管理员 (Admin)</option>
                    </select>
                    <div class="error-msg" id="reg-role-error"></div>
                </div>
                <button type="submit" class="btn">注 册</button>
                <div class="message" id="register-msg"></div>
            </form>
        </div>
    </div>

    <script>
        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.message').forEach(m => { m.className = 'message'; });
            document.querySelectorAll('.error-msg').forEach(e => { e.style.display = 'none'; });

            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('login-panel').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('register-panel').classList.add('active');
            }
        }

        // Show field error
        function showError(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.style.display = 'block';
        }

        // Clear all errors
        function clearErrors(prefix) {
            document.querySelectorAll(`[id^="${prefix}"]`).forEach(el => {
                if (el.classList.contains('error-msg')) el.style.display = 'none';
            });
        }

        // Show message
        function showMsg(id, msg, type) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.className = 'message ' + type;
        }

        // Login handler (prototype only)
        function handleLogin(e) {
            e.preventDefault();
            clearErrors('login-');
            const account = document.getElementById('login-account').value.trim();
            const password = document.getElementById('login-password').value;

            let valid = true;
            if (!account) { showError('login-account-error', '请输入账号'); valid = false; }
            if (!password) { showError('login-password-error', '请输入密码'); valid = false; }
            if (!valid) return;

            // Prototype: check localStorage
            const users = JSON.parse(localStorage.getItem('ta_users') || '{}');
            if (!users[account]) {
                showMsg('login-msg', '账号不存在，请先注册', 'error');
                return;
            }
            if (users[account].password !== password) {
                showMsg('login-msg', '密码错误，请重试', 'error');
                return;
            }

            const role = users[account].role;
            const roleNames = { applicant: '应聘者', mo: '课程组织者', admin: '系统管理员' };
            showMsg('login-msg', '登录成功！角色：' + roleNames[role] + '，即将跳转...', 'success');

            // Prototype: would redirect based on role
            // setTimeout(() => { window.location.href = role + '_dashboard.html'; }, 1500);
        }

        // Register handler (prototype only)
        function handleRegister(e) {
            e.preventDefault();
            clearErrors('reg-');
            const account = document.getElementById('reg-account').value.trim();
            const password = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;
            const role = document.getElementById('reg-role').value;

            let valid = true;
            if (!account) { showError('reg-account-error', '请输入账号'); valid = false; }
            if (!password) { showError('reg-password-error', '请输入密码'); valid = false; }
            else if (password.length < 6) { showError('reg-password-error', '密码至少6位'); valid = false; }
            if (password !== confirm) { showError('reg-confirm-error', '两次密码不一致'); valid = false; }
            if (!role) { showError('reg-role-error', '请选择角色'); valid = false; }
            if (!valid) return;

            // Check duplicate
            const users = JSON.parse(localStorage.getItem('ta_users') || '{}');
            if (users[account]) {
                showMsg('register-msg', '该账号已注册，请直接登录', 'error');
                return;
            }

            // Save
            users[account] = { password, role };
            localStorage.setItem('ta_users', JSON.stringify(users));

            showMsg('register-msg', '注册成功！请切换到登录页面', 'success');
            document.getElementById('register-form').reset();
        }
    </script>
</body>
</html>
